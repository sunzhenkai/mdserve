name: release

# Triggered when a tag matching v* is pushed. Builds the frontend once (embedded
# into the binary via go:embed), cross-compiles 4 platforms on a single Linux
# runner, generates checksums, and publishes a GitHub Release.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Run tests (gate)
        run: go test ./...

      - name: Build frontend (embedded into binary)
        run: |
          cd web
          npm ci
          npm run build

      - name: Resolve version
        id: version
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Cross-compile binaries
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -e
          mkdir -p dist
          targets=(
            "linux amd64"
            "linux arm64"
            "darwin amd64"
            "darwin arm64"
          )
          for target in "${targets[@]}"; do
            read -r os arch <<< "$target"
            echo "::group::Building ${os}/${arch}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" \
              go build -ldflags "-X main.Version=${TAG}" -o "dist/mdserve" ./cmd/mdserve
            asset="dist/mdserve_${TAG}_${os}_${arch}.tar.gz"
            tar -C dist -czf "$asset" mdserve
            rm -f dist/mdserve
            echo "::endgroup::"
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Determine prerelease
        id: prerelease
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ "$tag" == *-rc* || "$tag" == *-beta* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
