name: ci

# Runs go test on every push to main and on pull requests targeting main.
# Acts as the merge gate; the release workflow also re-runs tests before building.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...
